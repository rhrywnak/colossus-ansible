#cloud-config
# =============================================================================
# VM-230: colossus-build1 — Fedora Server 44 build host
# cloud-init user-data (consumed via Proxmox: qm set --cicustom user=...)
# Node: pve-1 (temporary) | IP: 10.10.100.230/24
#
# MINIMAL on purpose: this only brings the box up to a reachable, SSH-able
# state. The build toolchain (Rust, Node, podman/buildah) is layered on
# afterwards by the `build-vm` Ansible role over SSH — NOT here.
#
# DEPLOY (copy into the Proxmox snippets dir on pve-1):
#   scp cloud-init/colossus-build1-user-data.yaml \
#       root@10.10.100.3:/var/coreos/snippets/colossus-build1-user-data.yaml
#
# SSH: password auth is disabled (ssh_pwauth: false). Access is via the two
# ssh_authorized_keys below (Mac + Ubuntu desktop) for the `core` user.
# =============================================================================

hostname: colossus-build1
fqdn: build.cogmai.com
preserve_hostname: false

# Operator user — matches the `core` user used on the CoreOS VMs
# (inventory/group_vars/coreos_vms.yml: ansible_user: core).
users:
  - name: core
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    groups: [wheel]
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAII0SXNZYe2s3+dv6MAq/3RQoNqlu7hURtiqmcKz8u+vY roman@macbook-m5
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ1dOykw0BuYrBAagKc3Ra92H9fNm5Nq8mp2N46mUpD6 roman@proxima-centauri

ssh_pwauth: false

packages:
  - qemu-guest-agent
  - git

# Expand the root partition + filesystem to fill the disk Proxmox grew by
# vm_disk_grow (+120G). Proxmox grows the block device only — growpart/resizefs
# extend the partition and FS inside the guest. The Guest-Generic image usually
# enables this by default; make it explicit so a large disk can't end up with a
# tiny root.
growpart:
  mode: auto
  devices: ["/"]
resize_rootfs: true

# Networking is NOT configured here. It is set via Proxmox-native cloud-init
# (qm set --ipconfig0 ip=...,gw=... --nameserver ...) in the proxmox-vm role's
# fedora branch. Proxmox writes it into the cloud-init network-config, which
# cloud-init applies at the correct pre-NetworkManager stage — avoiding the
# boot-ordering race a hand-written NM keyfile + runcmd would create.

runcmd:
  - systemctl enable --now qemu-guest-agent
