---
# proxmox-lxc role defaults
# Override per-container via extra vars or a vars file

# ── Container identity ───────────────────────────────────────
# ct_id:       (required) Proxmox CTID
# ct_hostname: (required) Container hostname

# ── Hardware ─────────────────────────────────────────────────
ct_cores: 1
ct_memory: 256
ct_swap: 128
ct_disk_size: 4

# ── Network ──────────────────────────────────────────────────
# ct_ip:      (required) IP with CIDR, e.g., "10.10.100.53/24"
# ct_gateway: (required) Gateway IP
ct_bridge: vmbr0
ct_nameserver: "1.1.1.1"
ct_searchdomain: "local"

# ── Storage & template ───────────────────────────────────────
ct_storage: local-lvm
ct_template_pattern: "debian-12-standard*.tar.zst"
ct_template_dir: /var/lib/vz/template/cache

# ── Container options ────────────────────────────────────────
ct_unprivileged: true
ct_nesting: true
ct_onboot: true
ct_auto_start: true

# ── ZFS datasets (optional) ─────────────────────────────────
# Create ZFS datasets on the host before container creation.
# Each entry creates a dataset if it doesn't exist and sets ownership.
# Use for containers that need externalized storage (golden rule).
#
# Example:
#   ct_zfs_datasets:
#     - name: "pbs-zfs/services/semaphore/data"
#       owner: "100999"
#       group: "100996"
#     - name: "pbs-zfs/services/semaphore/sync"
#       owner: "100999"
#       group: "100996"
ct_zfs_datasets: []

# ── Bind mounts (optional) ──────────────────────────────────
# Attach host directories as bind mounts inside the container.
# Applied via 'pct set' after creation, before start.
# Proxmox resets bind mount ownership to root:root on 'pct start',
# so ownership is re-applied after start.
#
# Example:
#   ct_bind_mounts:
#     - id: "mp0"
#       host_path: "/pbs-zfs/services/semaphore/data"
#       ct_path: "/mnt/data"
#       owner: "100999"
#       group: "100996"
#     - id: "mp1"
#       host_path: "/pbs-zfs/services/semaphore/sync"
#       ct_path: "/opt/db-sync"
#       owner: "100999"
#       group: "100996"
ct_bind_mounts: []

# ── SSH bootstrap ────────────────────────────────────────────
# After container creation, the role installs openssh-server and
# deploys SSH public keys so Ansible can reach the container
# directly for subsequent provisioning playbooks.
#
# ct_ssh_public_key:    Path to the operator SSH public key (on the Ansible controller)
# ct_semaphore_pubkey:  Content of the Semaphore automation key (optional)
ct_ssh_public_key: "~/.ssh/id_ed25519.pub"
ct_semaphore_pubkey: ""
