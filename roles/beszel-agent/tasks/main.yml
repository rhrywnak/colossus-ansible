---
# roles/beszel-agent/tasks/main.yml
#
# Installs the Beszel monitoring agent as a native binary with a
# systemd service unit. Works on Proxmox, LXC, and CoreOS hosts.

- name: Create beszel agent directory
  ansible.builtin.file:
    path: /opt/beszel-agent
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if beszel-agent binary exists
  ansible.builtin.stat:
    path: "{{ beszel_agent_binary_path }}"
  register: beszel_binary

- name: Download and extract beszel-agent binary
  when: not beszel_binary.stat.exists
  block:
    - name: Download beszel-agent tarball
      ansible.builtin.get_url:
        url: "{{ beszel_agent_download_url }}"
        dest: /tmp/beszel-agent.tar.gz
        mode: "0644"

    - name: Extract beszel-agent binary
      ansible.builtin.shell: >
        tar xzf /tmp/beszel-agent.tar.gz -C /opt/beszel-agent/ beszel-agent
      args:
        creates: "{{ beszel_agent_binary_path }}"
      notify: Restart beszel-agent

    - name: Clean up tarball
      ansible.builtin.file:
        path: /tmp/beszel-agent.tar.gz
        state: absent

- name: Create beszel user
  ansible.builtin.user:
    name: "{{ beszel_agent_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Deploy beszel-agent.service
  ansible.builtin.template:
    src: beszel-agent.service.j2
    dest: /etc/systemd/system/beszel-agent.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart beszel-agent

- name: Enable and start beszel-agent service
  ansible.builtin.systemd:
    name: beszel-agent
    enabled: true
    state: started
    daemon_reload: true

- name: Validate beszel-agent is running
  ansible.builtin.command: systemctl is-active beszel-agent
  register: beszel_status
  changed_when: false
  failed_when: beszel_status.rc != 0
