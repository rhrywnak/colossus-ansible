---
# Colossus-Legal post-deploy hook
# Called by deploy-app/tasks/deploy.yml AFTER container restart + health
# checks, when apps.colossus-legal.post_deploy is true.
#
# Why this lives here, not in main.yml:
# Restate resets service-level config (including retry_policy) whenever
# a new service revision is registered — which can happen on backend
# reconnect/re-discovery after a container restart. Any PATCH issued
# before the restart is wiped. See Restate docs:
#   "These options apply until the next revision of the service is
#    registered." — docs.restate.dev/services/configuration
#
# This file runs after the restart so the PATCH is the last word.
# A future durable fix is to set retry_policy in the Rust SDK code
# itself, so the value is part of the manifest and survives revisions.

- name: "Wait for Restate to re-discover DocumentPipeline after restart"
  # Polls the admin API until the service is reachable post-restart.
  # Short-circuits as soon as it returns 200, so this isn't a fixed sleep.
  ansible.builtin.uri:
    url: "{{ restate_admin_url }}/services/DocumentPipeline"
    method: GET
    status_code: 200
    timeout: 5
  register: restate_service_ready
  retries: 12
  delay: 5
  until: restate_service_ready.status == 200
  failed_when: false
  changed_when: false
  check_mode: false

- name: "Set max_attempts=2 on DocumentPipeline service"
  # Restate has no SDK-level API for max_attempts on the Rust SDK at the
  # current version, so we override via the admin API. Gated on the wait
  # above succeeding — if Restate never re-discovered the service, there
  # is nothing to PATCH and we skip cleanly.
  ansible.builtin.uri:
    url: "{{ restate_admin_url }}/services/DocumentPipeline"
    method: PATCH
    body_format: json
    body:
      retry_policy:
        max_attempts: 2
    status_code: 200
  when: restate_service_ready.status == 200
