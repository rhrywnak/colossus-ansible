---
# colossus-legal/tasks/main.yml
#
# Writes Quadlet container definitions, environment files,
# and frontend runtime configuration.
#
# Called by deploy-app role during deployment.
# Variable 'deploy_version' is set by the caller.

# ── Determine environment-specific Neo4j password ────────────
- name: "Set Neo4j password for environment"
  ansible.builtin.set_fact:
    _neo4j_password: >-
      {{ vault_colossus_legal_neo4j_password_prod
         if 'prod' in group_names
         else vault_colossus_legal_neo4j_password_dev }}
  no_log: true

# ── Set Anthropic API key ────────────────────────────────────
- name: "Set Anthropic API key"
  ansible.builtin.set_fact:
    _anthropic_api_key: "{{ vault_colossus_legal_anthropic_api_key }}"
  no_log: true

# ── Set PostgreSQL URL ─────────────────────────────────────
- name: "Set PostgreSQL URL"
  ansible.builtin.set_fact:
    _pg_url: "{{ colossus_legal_pg_url }}"  
  no_log: true

# ── Set Pipeline PostgreSQL URL ──────────────────────────────
- name: "Set Pipeline PostgreSQL URL"
  ansible.builtin.set_fact:
    _pg_url_v2: "{{ colossus_legal_pg_url_v2 }}"
  no_log: true

# ── Ensure storage directories exist ─────────────────────────
- name: "Create document storage directory"
  ansible.builtin.file:
    path: "{{ colossus_legal_documents_host_path }}"
    state: directory
    mode: "0755"

- name: "Create models storage directory"
  ansible.builtin.file:
    path: "{{ colossus_legal_models_host_path }}"
    state: directory
    mode: "0755"

# ── Write environment file (backend secrets) ─────────────────
- name: "Write backend environment file"
  ansible.builtin.template:
    src: colossus-legal-backend.env.j2
    dest: "{{ app_env_dir }}/colossus-legal-backend.env"
    mode: "0600"
  no_log: true

# ── Write frontend runtime config ────────────────────────────
# This file is mounted into the nginx container and served to the browser.
# The React app reads it at startup instead of using baked-in env vars.
- name: "Write frontend runtime config"
  ansible.builtin.template:
    src: config.js.j2
    dest: "{{ app_config_dir }}/colossus-legal/config.js"
    mode: "0644"

# ── Write nginx configuration ────────────────────────────────
- name: "Write nginx configuration"
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_config_dir }}/colossus-legal/nginx.conf"
    mode: "0644"

# ── Write Quadlet container definitions ──────────────────────
- name: "Write backend Quadlet file"
  ansible.builtin.template:
    src: colossus-backend.container.j2
    dest: "{{ quadlet_dir }}/colossus-backend.container"
    mode: "0644"

- name: "Write frontend Quadlet file"
  ansible.builtin.template:
    src: colossus-frontend.container.j2
    dest: "{{ quadlet_dir }}/colossus-frontend.container"
    mode: "0644"

# ── Restate service deployment registration ──────────────────
# After the backend container is up, register it with Restate so
# Restate can call back into our service handlers.
#
# DEFERRED-READY DESIGN: These tasks skip cleanly if the backend
# doesn't yet expose a /restate SDK endpoint. This is intentional —
# the Rust backend code adds the SDK endpoint in a future release,
# and we want this Ansible role to be ready for that promotion
# without requiring a coordinated change.
#
# Idempotent: GET-then-conditionally-POST. We never use the `force`
# flag, which the Restate docs say should never be used in production
# (it can break in-flight invocations).

- name: "Wait briefly for backend to be ready for Restate registration"
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:9080/restate/health"
    method: GET
    status_code: [200, 404]   # 404 is fine — means SDK not yet integrated
    timeout: 5
  register: backend_restate_endpoint
  failed_when: false
  changed_when: false

- name: "Check Restate admin API reachability"
  ansible.builtin.uri:
    url: "{{ restate_admin_url }}/health"
    method: GET
    status_code: 200
    timeout: 5
  register: restate_admin_reachable
  failed_when: false
  changed_when: false
  # Only check if backend exposes a Restate SDK endpoint
  when: backend_restate_endpoint.status == 200

- name: "List currently registered Restate deployments"
  ansible.builtin.uri:
    url: "{{ restate_admin_url }}/deployments"
    method: GET
    return_content: true
    status_code: 200
  register: restate_deployments
  # Only list if Restate admin is reachable AND backend has SDK endpoint
  when:
    - backend_restate_endpoint.status == 200
    - restate_admin_reachable.status == 200
  changed_when: false

- name: "Register backend deployment with Restate (idempotent)"
  ansible.builtin.uri:
    url: "{{ restate_admin_url }}/deployments"
    method: POST
    body_format: json
    body:
      uri: "{{ restate_backend_callback_url }}"
    status_code: 201
  when:
    - backend_restate_endpoint.status == 200
    - restate_admin_reachable.status == 200
    - restate_deployments is defined
    - restate_deployments.json is defined
    - >-
      (restate_deployments.json.deployments
       | default(restate_deployments.json)
       | selectattr('uri', 'equalto', restate_backend_callback_url)
       | list | length) == 0

- name: "Show Restate registration status"
  ansible.builtin.debug:
    msg: >-
      {% if backend_restate_endpoint.status != 200 %}
      Backend does not yet expose /restate endpoint — skipping registration.
      This is expected until the Rust backend integrates the Restate SDK.
      {% elif restate_admin_reachable.status != 200 %}
      Backend has /restate endpoint but Restate admin API is not reachable
      at {{ restate_admin_url }}. Check that the restate app is deployed.
      {% else %}
      Backend is registered with Restate at {{ restate_backend_callback_url }}.
      {% endif %}
