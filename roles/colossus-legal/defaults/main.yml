---
# Colossus-Legal application defaults
# Override in group_vars/dev.yml and group_vars/prod.yml

colossus_legal_backend_port: 3403
colossus_legal_frontend_port: 5473

# Document storage — virtiofs mount, legal PDF files
colossus_legal_documents_host_path: "/mnt/data/legal-docs"
colossus_legal_documents_container_path: "/data/documents"

# Model storage — virtiofs mount, fastembed ONNX model cache
# Models auto-download on first use (~270MB). Must be rw.
colossus_legal_models_host_path: "/mnt/data/models"
colossus_legal_models_container_path: "/data/models"

# Internal backend URL for nginx reverse proxy
# Override in group_vars/dev.yml and group_vars/prod.yml
colossus_legal_backend_internal_url: "http://localhost:3403"
