---
# proxmox-vm/tasks/main.yml
#
# Creates a Proxmox VM on a Proxmox host. Two provisioning modes:
#   - coreos (default): Fedora CoreOS via Ignition (cicustom vendor= slot)
#   - fedora:           Fedora Server via cloud-init VENDOR-data + native flags
# Idempotent: skips entirely if the VMID already exists.
#
# Required variables:
#   vm_id:                     Proxmox VMID (e.g., 110)
#   vm_name:                   VM hostname (e.g., colossus-prod-db1)
#   vm_ignition:               Ignition filename — required when vm_provision == "coreos"
#   vm_cloudinit_vendordata:   vendor-data filename — required when vm_provision == "fedora"
#   vm_ciuser / vm_sshkeys_file / vm_ip / vm_gateway / vm_nameserver
#                              — also required when vm_provision == "fedora"

# ── Validate required variables ──────────────────────────────

- name: "Validate required VM variables"
  ansible.builtin.assert:
    that:
      - vm_id is defined
      - vm_name is defined
      # Ignition required only for the CoreOS path …
      - (vm_provision != "coreos") or (vm_ignition is defined)
      # … vendor-data + identity + static network required only for the Fedora path.
      - (vm_provision != "fedora") or (vm_cloudinit_vendordata is defined and vm_cloudinit_vendordata | length > 0)
      - (vm_provision != "fedora") or (vm_ciuser | length > 0)
      - (vm_provision != "fedora") or (vm_sshkeys_file | length > 0)
      - (vm_provision != "fedora") or (vm_ip | length > 0)
      - (vm_provision != "fedora") or (vm_gateway | length > 0)
      - (vm_provision != "fedora") or (vm_nameserver | length > 0)
    fail_msg: >-
      Required: vm_id, vm_name, and either vm_ignition (vm_provision=coreos)
      or vm_cloudinit_vendordata + vm_ciuser + vm_sshkeys_file + vm_ip
      + vm_gateway + vm_nameserver (vm_provision=fedora).
    quiet: true

# ── Check if VM already exists (idempotency) ────────────────

- name: "Check if VM {{ vm_id }} already exists"
  ansible.builtin.command:
    cmd: "qm status {{ vm_id }}"
  register: vm_exists
  changed_when: false
  failed_when: false

- name: "VM {{ vm_id }} already exists — skipping creation"
  ansible.builtin.debug:
    msg: "VM {{ vm_id }} ({{ vm_name }}) already exists. No changes made."
  when: vm_exists.rc == 0

# ── All creation tasks are skipped if VM exists ──────────────

- name: "Create VM {{ vm_id }} ({{ vm_name }})"
  when: vm_exists.rc != 0
  block:

    # ── Pre-flight checks ────────────────────────────────────

    # ── CoreOS image discovery (vm_provision == "coreos") ────

    - name: "Find CoreOS QCOW2 image"
      ansible.builtin.find:
        paths: "{{ vm_coreos_images_dir }}"
        patterns: "fedora-coreos-*-proxmoxve.x86_64.qcow2"
      register: coreos_images
      when: vm_provision == "coreos"

    - name: "Fail if no CoreOS image found"
      ansible.builtin.fail:
        msg: >
          No CoreOS QCOW2 image found in {{ vm_coreos_images_dir }}.
          Download one first:
            podman run --pull=always --rm -v '{{ vm_coreos_images_dir }}:/data' -w /data
            quay.io/coreos/coreos-installer:release download -s stable -p proxmoxve -f qcow2.xz --decompress
      when:
        - vm_provision == "coreos"
        - coreos_images.files | length == 0

    - name: "Set CoreOS image path (latest version)"
      ansible.builtin.set_fact:
        vm_image_qcow: "{{ (coreos_images.files | sort(attribute='path') | last).path }}"
      when: vm_provision == "coreos"

    # ── Fedora cloud image discovery (vm_provision == "fedora") ──

    - name: "Find Fedora QCOW2 image"
      ansible.builtin.find:
        paths: "{{ vm_fedora_images_dir }}"
        patterns: "{{ vm_fedora_image_glob }}"
      register: fedora_images
      when: vm_provision == "fedora"

    - name: "Fail if no Fedora image found"
      ansible.builtin.fail:
        msg: >
          No Fedora cloud QCOW2 image matching '{{ vm_fedora_image_glob }}'
          found in {{ vm_fedora_images_dir }}.
          NOTE: Fedora 44 renamed its cloud image — there is no "Fedora-Server-KVM-*".
          Fetch the Fedora Server 44 cloud (Guest Generic) qcow2 first:
            curl -L -o {{ vm_fedora_images_dir }}/Fedora-Server-Guest-Generic-44-1.7.x86_64.qcow2 \
              https://download.fedoraproject.org/pub/fedora/linux/releases/44/Server/x86_64/images/Fedora-Server-Guest-Generic-44-1.7.x86_64.qcow2
          Then set vm_fedora_image_glob to match the downloaded filename
          (e.g. "Fedora-Server-Guest-Generic-44-*.x86_64.qcow2").
      when:
        - vm_provision == "fedora"
        - fedora_images.files | length == 0

    - name: "Set Fedora image path (latest version)"
      ansible.builtin.set_fact:
        vm_image_qcow: "{{ (fedora_images.files | sort(attribute='path') | last).path }}"
      when: vm_provision == "fedora"

    # ── Ignition presence check (CoreOS only) ────────────────

    - name: "Verify Ignition file exists"
      ansible.builtin.stat:
        path: "{{ vm_coreos_snippets_dir }}/{{ vm_ignition }}"
      register: ign_file
      when: vm_provision == "coreos"

    - name: "Fail if Ignition file missing"
      ansible.builtin.fail:
        msg: >
          Ignition file not found: {{ vm_coreos_snippets_dir }}/{{ vm_ignition }}.
          Transpile the Butane config and copy it first:
            scp {{ vm_ignition }} root@{{ inventory_hostname }}:{{ vm_coreos_snippets_dir }}/
      when:
        - vm_provision == "coreos"
        - not ign_file.stat.exists

    # ── cloud-init vendor-data presence check (Fedora only) ──

    - name: "Verify cloud-init vendor-data file exists"
      ansible.builtin.stat:
        path: "{{ vm_coreos_snippets_dir }}/{{ vm_cloudinit_vendordata }}"
      register: vendordata_file
      when: vm_provision == "fedora"

    - name: "Fail if cloud-init vendor-data file missing"
      ansible.builtin.fail:
        msg: >
          cloud-init vendor-data not found: {{ vm_coreos_snippets_dir }}/{{ vm_cloudinit_vendordata }}.
          Copy it into the snippets dir first:
            scp {{ vm_cloudinit_vendordata }} root@{{ inventory_hostname }}:{{ vm_coreos_snippets_dir }}/
      when:
        - vm_provision == "fedora"
        - not vendordata_file.stat.exists

    - name: "Ensure Proxmox coreos storage exists"
      ansible.builtin.command:
        cmd: "pvesm status"
      register: pvesm_list
      changed_when: false

    - name: "Create coreos storage if missing"
      ansible.builtin.shell: |
        mkdir -p {{ vm_coreos_store_path }}/{images,snippets}
        pvesm add dir {{ vm_coreos_store_id }} --path {{ vm_coreos_store_path }} --content images,snippets
      when: vm_coreos_store_id not in pvesm_list.stdout

    - name: "Verify virtiofs directory mappings exist"
      ansible.builtin.command:
        cmd: "pvesh get /cluster/mapping/dir/{{ item.dirid }}"
      loop: "{{ vm_virtiofs_shares }}"
      loop_control:
        label: "{{ item.dirid }}"
      changed_when: false
      when: vm_virtiofs_shares | length > 0

    # ── Create VM ────────────────────────────────────────────

    - name: "Create VM {{ vm_id }}"
      ansible.builtin.command:
        cmd: >
          qm create {{ vm_id }}
          --name {{ vm_name }}
          --machine {{ vm_machine }}
          --cores {{ vm_cores }}
          --memory {{ vm_memory }}
          --net0 "virtio,bridge={{ vm_bridge }}"
          --scsihw {{ vm_scsihw }}

    - name: "Import VM disk"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --scsi0 {{ vm_storage }}:0,import-from={{ vm_image_qcow }}"

    - name: "Grow disk by {{ vm_disk_grow }}"
      ansible.builtin.command:
        cmd: "qm resize {{ vm_id }} scsi0 {{ vm_disk_grow }}"

    - name: "Attach cloud-init drive"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --ide2 {{ vm_storage }}:cloudinit"

    - name: "Set boot order"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --boot order=scsi0"

    - name: "Enable serial console"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --serial0 socket --vga serial0"

    # Adds the virtio-serial guest-agent device. Without it, qemu-guest-agent
    # cannot start inside the guest. Opt-in (default off) so existing CoreOS
    # VMs that never set vm_agent_enabled are unaffected.
    - name: "Enable QEMU guest agent"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --agent enabled=1"
      when: vm_agent_enabled | bool

    # CoreOS consumes Ignition through the cloud-init *vendor* slot.
    - name: "Configure Ignition via cloud-init vendor snippet"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --cicustom vendor={{ vm_coreos_store_id }}:snippets/{{ vm_ignition }}"
      when: vm_provision == "coreos"

    # Fedora consumes our customisations through the *vendor* slot. The user
    # slot is intentionally avoided: --cicustom user= makes Proxmox stop
    # generating hostname + network, leaving the VM as "localhost" with no net.
    - name: "Configure cloud-init via vendor-data snippet"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --cicustom vendor={{ vm_coreos_store_id }}:snippets/{{ vm_cloudinit_vendordata }}"
      when: vm_provision == "fedora"

    # Identity is Proxmox-native (vendor-data ignores the users: block). Stage
    # the repo's authorized-keys file onto the host, then point --sshkeys at it.
    - name: "Copy SSH authorized-keys file to host snippets dir"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../cloud-init/{{ vm_sshkeys_file }}"
        dest: "{{ vm_coreos_snippets_dir }}/{{ vm_sshkeys_file }}"
        mode: "0644"
      when: vm_provision == "fedora"

    - name: "Set cloud-init user + SSH keys (fedora)"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --ciuser {{ vm_ciuser }} --sshkeys {{ vm_coreos_snippets_dir }}/{{ vm_sshkeys_file }}"
      when: vm_provision == "fedora"

    # Fedora networking is Proxmox-native: cloud-init writes it into the
    # network-config and applies it at the correct pre-NetworkManager stage.
    # (CoreOS sets no ipconfig — Ignition owns its network.)
    - name: "Set static network (fedora cloud-init)"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --ipconfig0 ip={{ vm_ip }},gw={{ vm_gateway }} --nameserver {{ vm_nameserver }}"
      when: vm_provision == "fedora"

    # Disable Proxmox cloud-init's package-upgrade-on-first-boot. For CoreOS
    # this is a long-standing default; for Fedora user/keys/network are set via
    # native flags above and vendor-data carries packages/disk, so we only need
    # to suppress the auto-upgrade.
    - name: "Disable cloud-init auto-upgrade"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --ciupgrade 0"

    # Relative CPU scheduling weight. Left at the default (100) → skipped, so
    # existing VMs are never reconfigured. Applies to both provision types.
    - name: "Set CPU scheduling weight (cpuunits)"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} --cpuunits {{ vm_cpuunits }}"
      when: vm_cpuunits != 100

    # ── Attach virtiofs shares (if any) ──────────────────────

    - name: "Attach virtiofs shares"
      ansible.builtin.command:
        cmd: "qm set {{ vm_id }} -virtiofs{{ idx }} dirid={{ item.dirid }},cache={{ item.cache | default('always') }}"
      loop: "{{ vm_virtiofs_shares }}"
      loop_control:
        index_var: idx
        label: "virtiofs{{ idx }}={{ item.dirid }}"
      when: vm_virtiofs_shares | length > 0

    # ── Optionally start ─────────────────────────────────────

    - name: "Start VM {{ vm_id }}"
      ansible.builtin.command:
        cmd: "qm start {{ vm_id }}"
      when: vm_auto_start

    # ── Summary ──────────────────────────────────────────────

    - name: "VM creation complete"
      ansible.builtin.debug:
        msg: >-
          VM {{ vm_id }} ({{ vm_name }}) created [{{ vm_provision }}].
          Cores: {{ vm_cores }}, Memory: {{ vm_memory }}MB,
          virtiofs: {{ vm_virtiofs_shares | length }} shares.
          {% if not vm_auto_start %}Start with: qm start {{ vm_id }}{% endif %}
