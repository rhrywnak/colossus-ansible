---
# roles/pihole-exporter/tasks/main.yml
# Installs bazmonk/pihole6_exporter on Pi-hole v6 hosts

- name: Install python3-prometheus-client
  ansible.builtin.apt:
    name: python3-prometheus-client
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create service user (no login, no home)
  ansible.builtin.user:
    name: "{{ pihole_exporter_user }}"
    group: nogroup
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Download pihole6_exporter script
  ansible.builtin.get_url:
    url: "{{ pihole_exporter_repo_url }}"
    dest: "{{ pihole_exporter_bin }}"
    mode: "0755"
    owner: root
    group: root
  notify: Restart pihole6-exporter

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: pihole6-exporter.service.j2
    dest: /etc/systemd/system/pihole6-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart pihole6-exporter

- name: Enable and start pihole6-exporter
  ansible.builtin.systemd:
    name: pihole6-exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Validate metrics endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ pihole_exporter_port }}/metrics"
    return_content: true
    status_code: 200
  register: metrics_check
  retries: 3
  delay: 2
  until: metrics_check.status == 200

- name: Confirm pihole metrics present
  ansible.builtin.assert:
    that:
      - "'pihole_query_count' in metrics_check.content"
    fail_msg: "pihole6_exporter is running but not returning Pi-hole metrics"
    success_msg: "pihole6_exporter validated — Pi-hole metrics flowing on port {{ pihole_exporter_port }}"
