---
# roles/vllm-serve/tasks/main.yml
# PART 1: secrets env file + model cache placement.
# (Surya unit, ufw, quadlet install/validate are added in part 2.)

# ── Bind vault secrets to locals (house pattern: set_fact + no_log) ──
- name: "Set vLLM API key"
  ansible.builtin.set_fact:
    _vllm_api_key: "{{ vault_vllm_api_key }}"
  no_log: true

- name: "Set Hugging Face token"
  ansible.builtin.set_fact:
    _hf_token: "{{ vault_hf_token }}"
  no_log: true

# ── System model-cache directory (root-owned, HF hub layout) ──
- name: "Create vLLM models directory"
  ansible.builtin.file:
    path: "{{ vllm_models_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Create HF hub subdirectory under the models dir"
  ansible.builtin.file:
    path: "{{ vllm_models_dir }}/hub"
    state: directory
    owner: root
    group: root
    mode: "0755"

# ── Move the cached 14B-AWQ snapshot to the system path (once) ──
# Moves ONLY this model dir, preserving the HF hub layout so the pinned
# refs/main SHA resolves as a cache hit. The 70B/72B POC leftovers in
# ~roman/.cache/huggingface are deliberately NOT migrated (H1 as-built).
# Guarded by creates: — runs once, then changed=0 forever.
- name: "Check for the cached model at the source path"
  ansible.builtin.stat:
    path: "/home/roman/.cache/huggingface/hub/models--Qwen--Qwen2.5-14B-Instruct-AWQ"
  register: _cached_model_src
  check_mode: false

- name: "Move cached 14B-AWQ into the system models dir"
  ansible.builtin.command:
    cmd: >-
      mv /home/roman/.cache/huggingface/hub/models--Qwen--Qwen2.5-14B-Instruct-AWQ
      {{ vllm_models_dir }}/hub/models--Qwen--Qwen2.5-14B-Instruct-AWQ
    creates: "{{ vllm_models_dir }}/hub/models--Qwen--Qwen2.5-14B-Instruct-AWQ"
  when: _cached_model_src.stat.exists

- name: "Ensure moved model tree is root-owned"
  ansible.builtin.file:
    path: "{{ vllm_models_dir }}/hub/models--Qwen--Qwen2.5-14B-Instruct-AWQ"
    state: directory
    owner: root
    group: root
    recurse: true
  when: _cached_model_src.stat.exists

# ── Ensure the env directory exists (no upstream role creates it on this host) ──
- name: "Create the colossus env directory"
  ansible.builtin.file:
    path: "{{ vllm_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# ── Write the vLLM secrets env file (one per instance) ──
- name: "Write vLLM env file(s)"
  ansible.builtin.template:
    src: vllm.env.j2
    dest: "{{ vllm_env_dir }}/vllm-{{ item.name }}.env"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ vllm_instances }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

# ══════════════════════════════════════════════════════════════
# PART 2: Surya systemd unit + firewall + quadlet install/validate
# ══════════════════════════════════════════════════════════════

# ── Surya OCR systemd unit (promoted from bare process) ──
- name: "Deploy surya-ocr systemd unit"
  ansible.builtin.template:
    src: surya-ocr.service.j2
    dest: /etc/systemd/system/surya-ocr.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: surya_ocr_enabled | bool

- name: "Enable surya-ocr (start on boot; profile controls running state)"
  ansible.builtin.systemd:
    name: surya-ocr.service
    enabled: true
    daemon_reload: true
  when:
    - surya_ocr_enabled | bool
    - not ansible_check_mode

# ── vLLM Quadlet unit files (generator turns these into services) ──
- name: "Write vLLM Quadlet unit(s)"
  ansible.builtin.template:
    src: vllm.container.j2
    dest: "{{ quadlet_dir }}/vllm-{{ item.name }}.container"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ vllm_instances }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload systemd

# ── Firewall: additive scoped allow rules for the managed ports ──
- name: "Allow managed ports from trusted subnets"
  community.general.ufw:
    rule: allow
    port: "{{ item.1 }}"
    proto: tcp
    src: "{{ item.0 }}"
  loop: "{{ vllm_firewall_source_subnets | product(vllm_firewall_ports) | list }}"
  loop_control:
    label: "{{ item.0 }} -> {{ item.1 }}"

# ── Reload systemd so the Quadlet generator emits the vllm-*.service units ──
- name: "Reload systemd to generate Quadlet services"
  ansible.builtin.systemd:
    daemon_reload: true
  when: not ansible_check_mode

# ── Validate: unit files on disk + generated services known to systemd ──
- name: "Confirm Quadlet unit file(s) written"
  ansible.builtin.stat:
    path: "{{ quadlet_dir }}/vllm-{{ item.name }}.container"
  register: _vllm_quadlet_stat
  loop: "{{ vllm_instances }}"
  loop_control:
    label: "{{ item.name }}"
  when: not ansible_check_mode

- name: "Assert Quadlet unit file(s) exist"
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Quadlet unit missing for {{ item.item.name }}"
    success_msg: "Quadlet unit present for {{ item.item.name }}"
  loop: "{{ _vllm_quadlet_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not ansible_check_mode

# ══════════════════════════════════════════════════════════════
# PART 3: Boot-restore (Option A) — reconcile to last-active profile on boot
# ══════════════════════════════════════════════════════════════

- name: "Ensure jq is present (boot-restore script dependency)"
  ansible.builtin.apt:
    name: jq
    state: present

- name: "Render the profile->units map for the local boot-restore script"
  ansible.builtin.copy:
    content: "{{ gpu1_profiles | to_nice_json }}\n"
    dest: "{{ gpu1_profiles_json }}"
    owner: root
    group: root
    mode: "0644"

- name: "Install the boot-restore reconciler script"
  ansible.builtin.template:
    src: gpu1-profile-restore.sh.j2
    dest: "{{ gpu1_profile_restore_script }}"
    owner: root
    group: root
    mode: "0755"

- name: "Install the boot-restore oneshot unit"
  ansible.builtin.template:
    src: gpu1-profile-restore.service.j2
    dest: /etc/systemd/system/gpu1-profile-restore.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: "Enable gpu1-profile-restore (runs on boot)"
  ansible.builtin.systemd:
    name: gpu1-profile-restore.service
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode
