---
# roles/vllm-serve/defaults/main.yml
# Default variables for the vllm-serve role: vLLM serving + Surya OCR unit +
# GPU profile definitions. Data only; templates/tasks consume these.

# ── Image (NGC bridge pin — DESIGN D1; H3b flips to upstream vllm/vllm-openai) ──
vllm_image: "nvcr.io/nvidia/vllm@sha256:15f380ad9c32f0ac57ac16e4b778c6f733c88b9ffe3a936035d0a59ad17b1aab"  # NGC 25.09-py3, digest-pinned (D1; identity tuple C7)

# ── Paths ────────────────────────────────────────────────────
vllm_models_dir: /var/lib/vllm/models        # HF_HOME on the host (system path, root-owned)
vllm_env_dir: "{{ app_env_dir }}"            # /etc/colossus/env (from group_vars/all/main.yml)

# ── Open WebUI companion (DESIGN D7) ─────────────────────────
vllm_webui_enabled: true
vllm_webui_image: "ghcr.io/open-webui/open-webui:main"   # PIN a digest at template time
vllm_webui_port: 8088

# ── Surya OCR (venv systemd unit; owns cuda:1 via TORCH_DEVICE) ──
surya_ocr_enabled: true
surya_ocr_workdir: /home/roman/Projects/local-ocr
surya_ocr_python: /home/roman/surya-env/bin/python
surya_ocr_script: surya_ocr_service.py
surya_ocr_torch_device: "cuda:1"
surya_ocr_host: "0.0.0.0"

# ── Firewall (ufw) source scoping ────────────────────────────
# Additive allow rules for the managed ports, scoped to the trusted internal
# subnets: 10.10.100.0/24 (app tier) and 10.10.0.0/24 (workstation, incl. the
# Mac and this host). Does NOT remove the pre-existing wide-open rules (G-3) —
# that cleanup is a deliberate separate hardening step, not done here.
vllm_firewall_source_subnets:
  - "10.10.100.0/24"
  - "10.10.0.0/24"
# Ports opened to those subnets. WebUI port included only when enabled.
vllm_firewall_ports:
  - "{{ vllm_instances[0].port }}"   # 8001 vLLM
  - "{{ surya_ocr_port }}"           # 8340 Surya
