---
# playbooks/deploy-app.yml
#
# Deploy an application to target environment.
#
# Usage:
#   # Deploy to DEV (workstation)
#   ansible-playbook playbooks/deploy-app.yml \
#     -e app=colossus-legal \
#     -e version=v1.0.0 \
#     -l colossus-dev-app1 \
#     --vault-password-file ~/.vault_pass
#
#   # Deploy to PROD (workstation — interactive confirmation)
#   ansible-playbook playbooks/deploy-app.yml \
#     -e app=colossus-legal \
#     -e version=v1.0.0 \
#     -l colossus-prod-app1 \
#     --vault-password-file ~/.vault_pass
#
#   # Deploy to PROD (Semaphore — skip interactive pause)
#   # Set extra vars: app=colossus-legal version=v1.0.0 confirm_prod=true
#   # Semaphore's "Run" button is the human confirmation gate.

- name: "Deploy {{ app }} {{ version }}"
  hosts: app_vms
  become: true
  gather_facts: true

  pre_tasks:
    - name: "Validate deployment parameters"
      ansible.builtin.assert:
        that:
          - app is defined
          - version is defined
        fail_msg: "Required: -e app=<name> -e version=<tag>"
      run_once: true

    - name: "Confirm PROD deployment"
      ansible.builtin.pause:
        prompt: >
          ⚠️  You are deploying {{ app }} {{ version }} to PRODUCTION.
          Press Enter to continue or Ctrl+C to abort.
      when:
        - "'prod' in group_names"
        - not (confirm_prod | default(false) | bool)
      run_once: true

  roles:
    - role: deploy-app
      vars:
        action: deploy
