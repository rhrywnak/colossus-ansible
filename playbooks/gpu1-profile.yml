---
# playbooks/gpu1-profile.yml
#
# Reconcile colossus-llm1 to a declared GPU profile (DESIGN §1.2 / PLAN §1.2).
# A profile is a named set of systemd units that should be running; everything
# else in the managed set is stopped. Profiles are data in group_vars/gpu.yml
# (gpu1_profiles). Semaphore drives this via a survey dropdown (the UI); it can
# also be run manually.
#
# The managed universe = the union of every unit named across all profiles.
# The reconciler only ever stops/starts units in that universe — it never
# touches unrelated services.
#
# Usage:
#   ansible-playbook playbooks/gpu1-profile.yml -e gpu_profile=standard
#   ansible-playbook playbooks/gpu1-profile.yml -e gpu_profile=all-stop --check --diff
#
# NOTE: the vllm-*.service units are generated by the Quadlet generator from
# the .container files, which only exist AFTER deploy-gpu1.yml has run the
# vllm-serve role. Run deploy-gpu1.yml before the first profile switch.

- name: "Reconcile colossus-llm1 to a GPU profile"
  hosts: gpu
  become: true
  gather_facts: false

  pre_tasks:
    - name: "Validate gpu_profile was provided and is defined"
      ansible.builtin.assert:
        that:
          - gpu_profile is defined
          - gpu_profile in gpu1_profiles
        fail_msg: >-
          Set -e gpu_profile=<name>, one of:
          {{ gpu1_profiles.keys() | list | join(', ') }}
        success_msg: "Reconciling to profile '{{ gpu_profile }}'."

  tasks:
    # ── Compute the managed universe and the up/down sets ──
    - name: "Compute managed unit universe (union across all profiles)"
      ansible.builtin.set_fact:
        _managed_units: >-
          {{ gpu1_profiles.values() | map(attribute='up') | flatten | unique | list }}

    - name: "Compute units to bring up"
      ansible.builtin.set_fact:
        _up_units: "{{ gpu1_profiles[gpu_profile].up }}"

    - name: "Compute units to stop (managed but not in this profile)"
      ansible.builtin.set_fact:
        _down_units: "{{ _managed_units | difference(_up_units) }}"

    # ── Stop units not in the profile (graceful; vLLM drains on SIGTERM) ──
    - name: "Stop units not in profile"
      ansible.builtin.systemd:
        name: "{{ item }}.service"
        state: stopped
      loop: "{{ _down_units }}"
      register: _stop_result
      failed_when: false

    # ── Start units in the profile ──
    - name: "Start units in profile"
      ansible.builtin.systemd:
        name: "{{ item }}.service"
        state: started
      loop: "{{ _up_units }}"
      register: _start_result
      failed_when: false
      when: not ansible_check_mode

    # ── Health-wait: each started unit serves /health on its port ──
    # vLLM ports come from vllm_instances; surya from surya_ocr_port.
    # Model load into VRAM can take 1-3 min, so retry generously.
    - name: "Build port map for health checks"
      ansible.builtin.set_fact:
        _health_ports: >-
          {{ dict(
               (vllm_instances | map(attribute='name') | map('regex_replace', '^', 'vllm-') | list
                | zip(vllm_instances | map(attribute='port') | list))
             ) | combine({'surya-ocr': surya_ocr_port}) }}

    - name: "Wait for started units to report healthy"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _health_ports[item] }}/health"
        status_code: 200
        timeout: 5
      loop: "{{ _up_units }}"
      register: _health_result
      until: _health_result is success
      retries: 30
      delay: 6
      failed_when: false
      when:
        - not ansible_check_mode
        - item in _health_ports

    # ── Record the active profile ──
    - name: "Ensure /etc/colossus exists"
      ansible.builtin.file:
        path: "{{ gpu1_active_profile_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Write active profile marker"
      ansible.builtin.copy:
        content: "{{ gpu_profile }}\n"
        dest: "{{ gpu1_active_profile_file }}"
        owner: root
        group: root
        mode: "0644"
      when: not ansible_check_mode

    - name: "Report"
      ansible.builtin.debug:
        msg: >-
          Profile '{{ gpu_profile }}': started {{ _up_units | join(', ') | default('none') }};
          stopped {{ _down_units | join(', ') | default('none') }}.
