---
# playbooks/neo4j-sync/rollback.yml
#
# Emergency Rollback: Restore PROD from Pre-Sync Backup
# Maps to: NEO4J_DEV_TO_PROD_SYNC_RUNBOOK.md §8
#
# Restores PROD Neo4j to its pre-sync state using the most recent
# PROD backup from the archive directory.
#
# Backup search order:
#   1. /opt/db-sync/neo4j/prod-latest.dump (symlink from full sync)
#   2. /tmp/neo4j-sync/prod-pre-sync.dump (from individual phase runs)
#
# Run this if:
#   - Sync completed but PROD data looks wrong
#   - Application behavior is unexpected after sync
#   - Validation passed but something was missed

- name: "⚠ ROLLBACK — Restore PROD Neo4j from Pre-Sync Backup"
  hosts: colossus-prod-db1
  gather_facts: false
  become: true
  vars_files:
    - vars.yml
  vars:
    sync_archive_dir: /opt/db-sync/neo4j

  tasks:
    # ── Locate the backup file ────────────────────────────────────
    # Check archive first (full sync workflow), then staging (individual phases)
    - name: "Check archive for prod-latest.dump"
      ansible.builtin.stat:
        path: "{{ sync_archive_dir }}/prod-latest.dump"
      register: archive_backup
      delegate_to: localhost
      become: false

    - name: "Check staging for prod-pre-sync.dump (fallback)"
      ansible.builtin.stat:
        path: "{{ sync_staging_dir }}/{{ prod_backup_filename }}"
      register: staging_backup
      delegate_to: localhost
      become: false
      when: not archive_backup.stat.exists

    - name: "Select backup source"
      ansible.builtin.set_fact:
        rollback_source: >-
          {{
            (sync_archive_dir + '/prod-latest.dump')
            if archive_backup.stat.exists
            else (sync_staging_dir + '/' + prod_backup_filename)
          }}
        rollback_found: >-
          {{
            archive_backup.stat.exists
            or (staging_backup.stat.exists | default(false))
          }}

    - name: "GATE: Assert a backup was found"
      ansible.builtin.assert:
        that:
          - rollback_found | bool
        fail_msg: >
          No PROD backup found in either:
            - {{ sync_archive_dir }}/prod-latest.dump
            - {{ sync_staging_dir }}/{{ prod_backup_filename }}
          Manual recovery from PBS daily backup is required.
        success_msg: "Rollback source: {{ rollback_source }}"

    - name: "Stat selected backup"
      ansible.builtin.stat:
        path: "{{ rollback_source }}"
      register: backup_file
      delegate_to: localhost
      become: false

    - name: "Display backup details"
      ansible.builtin.debug:
        msg: "Restoring from: {{ rollback_source }} ({{ backup_file.stat.size | human_readable }})"

    # ── Stop PROD Neo4j ───────────────────────────────────────────
    - name: "Stop {{ neo4j_service }} on PROD (VM-110)"
      ansible.builtin.systemd:
        name: "{{ neo4j_service }}"
        state: stopped

    - name: "Verify service is stopped"
      ansible.builtin.systemd:
        name: "{{ neo4j_service }}"
      register: svc_state
      failed_when: svc_state.status.ActiveState not in ["inactive", "failed"]

    # ── Remove any stale dump file ────────────────────────────────
    - name: "Remove stale dump file (if present)"
      ansible.builtin.file:
        path: "{{ neo4j_data_dir }}/{{ neo4j_dump_filename }}"
        state: absent

    # ── Copy backup to PROD ───────────────────────────────────────
    - name: "Copy backup to PROD /tmp"
      ansible.builtin.copy:
        src: "{{ rollback_source }}"
        dest: "/tmp/{{ neo4j_dump_filename }}"
        mode: '0644'

    - name: "Move backup into PROD data directory"
      ansible.builtin.command: >
        mv /tmp/{{ neo4j_dump_filename }} {{ neo4j_data_dir }}/{{ neo4j_dump_filename }}

    # ── Restore from backup ───────────────────────────────────────
    - name: "Restore PROD from pre-sync backup"
      ansible.builtin.command: >
        podman run --rm
        {{ podman_security_opts }}
        -v {{ neo4j_data_dir }}:/data
        {{ neo4j_image }}
        neo4j-admin database load neo4j
        --from-path=/data
        --overwrite-destination=true
      register: restore_result

    - name: "Display restore output"
      ansible.builtin.debug:
        msg: "{{ restore_result.stdout_lines }}"
      when: restore_result.stdout_lines | length > 0

    # ── Clean up and restart ──────────────────────────────────────
    - name: "Remove dump file from PROD data directory"
      ansible.builtin.file:
        path: "{{ neo4j_data_dir }}/{{ neo4j_dump_filename }}"
        state: absent

    - name: "Start {{ neo4j_service }} on PROD"
      ansible.builtin.systemd:
        name: "{{ neo4j_service }}"
        state: started

    - name: "Wait for PROD Neo4j to become ready"
      ansible.builtin.uri:
        url: "http://localhost:{{ neo4j_port }}"
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: "{{ neo4j_startup_retries }}"
      delay: "{{ neo4j_startup_delay }}"

    - name: "GATE: Assert PROD Neo4j recovered"
      ansible.builtin.assert:
        that:
          - health_check.status == 200
        fail_msg: >
          PROD Neo4j did not recover after rollback restore.
          Manual intervention required — check journalctl on VM-110.
        success_msg: "PROD Neo4j restored and healthy."

    # ── Summary ───────────────────────────────────────────────────
    - name: "═══ ROLLBACK SUMMARY ═══"
      ansible.builtin.debug:
        msg: |

          ═══════════════════════════════════════════════════════
           ROLLBACK COMPLETE
          ═══════════════════════════════════════════════════════

           Restored from: {{ rollback_source }}
           Backup size:   {{ backup_file.stat.size | human_readable }}

           PROD Neo4j has been restored to its pre-sync state.
           Service is online and accepting connections.

           Next steps:
             1. Verify PROD data via application or manual query
             2. Investigate what went wrong before retrying
          ═══════════════════════════════════════════════════════
