---
# Traefik (CT-313) -- route definitions
#
# This is the single source of truth for all Traefik routes.
# The traefik-route role templates /etc/traefik/dynamic/services.yml
# from this list. If a route isn't here, it won't exist on disk.
#
# Route properties:
#   name:        (required) Unique router/service identifier
#   host:        (required) FQDN for the Host() match rule
#   backend_url: (required*) Backend service URL
#   service:     (required*) Built-in service override (e.g., api@internal)
#   external:    (optional) true = create HTTP router for Cloudflare Tunnel
#   protected:   (optional) true = apply ForwardAuth middleware
#
#   * Exactly one of backend_url or service must be specified.

# -- Authentication Middleware ------------------------------------------------
# ForwardAuth middleware for Authentik. When enabled, routes with
# protected: true require authentication before Traefik forwards
# to the backend service.
#
# Emergency override: set enabled: false to bypass auth globally
# and restore direct access to all services.
traefik_auth:
  enabled: true
  name: "authentik"
  address: "http://10.10.100.58:9000/outpost.goauthentik.io/auth/traefik"
  response_headers:
    - "X-authentik-username"
    - "X-authentik-groups"
    - "X-authentik-entitlements"
    - "X-authentik-email"
    - "X-authentik-name"
    - "X-authentik-uid"
    - "X-authentik-jwt"
    - "X-authentik-meta-jwks"
    - "X-authentik-meta-outpost"
    - "X-authentik-meta-provider"
    - "X-authentik-meta-app"
    - "X-authentik-meta-version"

# -- Authentik Portal Route ---------------------------------------------------
# The auth portal itself and the outpost callback path.
# These are special routes rendered by the template separately.
traefik_auth_portal:
  host: "auth.{{ domain }}"
  backend_url: "http://10.10.100.58:9000"

# -- Application Routes -------------------------------------------------------
traefik_routes:
  # -- Colossus-Legal PROD --
  - name: colossus-legal-frontend
    host: "colossus-legal.{{ domain }}"
    backend_url: "http://10.10.100.120:5473"
    external: true
    protected: true

  - name: colossus-legal-api
    host: "colossus-legal-api.{{ domain }}"
    backend_url: "http://10.10.100.120:3403"
    external: true
    protected: true

  # -- Colossus-Legal DEV --
  - name: colossus-legal-dev
    host: "colossus-legal-dev.{{ domain }}"
    backend_url: "http://10.10.100.220:5473"
    external: true
    protected: true

  - name: colossus-legal-api-dev
    host: "colossus-legal-api-dev.{{ domain }}"
    backend_url: "http://10.10.100.220:3403"
    external: true
    protected: true

  # -- Infrastructure --
  - name: traefik-dashboard
    host: "traefik.{{ domain }}"
    service: "api@internal"
    external: false
    protected: true

  - name: semaphore
    host: "semaphore.{{ domain }}"
    backend_url: "http://10.10.100.57:3000"
    external: false
    protected: true

  # -- Monitoring --
  - name: grafana
    host: "grafana.{{ domain }}"
    backend_url: "http://10.10.100.56:3000"
    external: false
    protected: true
