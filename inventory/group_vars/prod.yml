---
# PROD environment configuration
# Applied when deploying with: -l prod

# ── Network ──────────────────────────────────────────────────
prod_db_host: 10.10.100.110       # VM-110 (colossus-prod-db1)
# prod_app_host: 10.10.100.120    # VM-120 (colossus-prod-app1) — uncomment when created

# ── Colossus-Legal: Backend ──────────────────────────────────
colossus_legal_neo4j_uri: "bolt://{{ prod_db_host }}:7687"
colossus_legal_neo4j_user: "neo4j"
colossus_legal_qdrant_url: "http://{{ prod_db_host }}:6333"
colossus_legal_rust_log: "info"
colossus_legal_document_path: "/data/documents"
colossus_legal_fastembed_cache_path: "/data/models"
colossus_legal_anthropic_model: "claude-sonnet-4-6"
colossus_legal_pg_url: "postgres://postgres:{{ vault_colossus_legal_pg_password_prod }}@10.10.100.110:5432/colossus_legal"

# ── Colossus-Legal: Nginx Reverse Proxy ──────────────────────
colossus_legal_backend_internal_url: "http://10.10.100.120:3403"

# ── Colossus-Legal: Frontend ─────────────────────────────────
# Empty string = same-origin (nginx reverse proxy handles /api/ routing)
colossus_legal_api_url: ""
colossus_legal_cors_origins: "https://colossus-legal.cogmai.com,http://localhost:5473"
colossus_legal_auth_logout_url: "https://auth.cogmai.com/application/o/colossus-services/end-session/?post_logout_redirect_uri=https://colossus-legal.cogmai.com/"
