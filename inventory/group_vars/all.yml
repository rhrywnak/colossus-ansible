---
# Shared configuration — applies to all environments

# ── Container Registry ───────────────────────────────────────
# GitHub Container Registry
# Replace 'GITHUB_USERNAME' with your actual GitHub username
container_registry: "ghcr.io/rhrywnak"

# ── Paths (CoreOS conventions) ───────────────────────────────
# Quadlet container definitions
quadlet_dir: /etc/containers/systemd

# Application environment files
app_env_dir: /etc/colossus/env

# Application config files (runtime injection)
app_config_dir: /etc/colossus/config

# Deployment manifests (version tracking)
deployment_manifest_dir: /etc/colossus/deployments

# ── Application Definitions ──────────────────────────────────
# Each app declares its containers, ports, and health checks.
# The deploy-app role reads this to know what to deploy.
#
# When adding a new app, add an entry here with:
#   - containers: list of {name, image_name, port}
#   - health_checks: list of {url, expect_status, expect_body}
#   - role: the Ansible role that writes app-specific configs

apps:
  colossus-legal:
    role: colossus-legal
    containers:
      - name: colossus-backend
        image_name: colossus-backend
        port: 3403
      - name: colossus-frontend
        image_name: colossus-frontend
        port: 5473
    health_checks:
      - url: "http://{{ ansible_host }}:3403/health"
        expect_status: 200
        description: "Backend health endpoint"
      - url: "http://{{ ansible_host }}:5473/"
        expect_status: 200
        description: "Frontend serves HTML"

# ── Network & Infrastructure ─────────────────────────────────
domain: cogmai.com
traefik_ip: 10.10.100.55
pihole_ip: 10.10.100.53
truenas_ip: 10.10.0.38
pbs_ip: 10.10.100.242

# ── Default SSH user (overridden per group) ──────────────────
ansible_user: root
ansible_python_interpreter: /usr/bin/python3
