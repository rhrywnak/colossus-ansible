---
# DEV environment configuration
# Applied when deploying with: -l dev

# ── Network ──────────────────────────────────────────────────
dev_db_host: 10.10.100.200        # VM-210 (colossus-dev-db1)
# dev_app_host: 10.10.100.220     # VM-220 (colossus-dev-app1) — uncomment when created

# ── Colossus-Legal: Backend ──────────────────────────────────
colossus_legal_neo4j_uri: "bolt://{{ dev_db_host }}:7687"
colossus_legal_neo4j_user: "neo4j"
colossus_legal_qdrant_url: "http://{{ dev_db_host }}:6333"
colossus_legal_rust_log: "debug"
colossus_legal_document_path: "/data/documents"
colossus_legal_fastembed_cache_path: "/data/models"
colossus_legal_anthropic_model: "claude-sonnet-4-6"
colossus_legal_pg_url: "postgres://postgres:{{ vault_colossus_legal_pg_password_dev }}@10.10.100.200:5432/colossus_legal"
colossus_legal_pg_url_v2: "postgres://postgres:{{ vault_colossus_legal_pg_password_dev }}@10.10.100.200:5432/colossus_legal_v2"

# ── Colossus-Legal: Nginx Reverse Proxy ──────────────────────
# Backend IP for frontend nginx to proxy /api/ requests to backend
# Uses the host IP since frontend and backend are separate containers on same VM
colossus_legal_backend_ip: "10.10.100.220"

# ── Colossus-Legal: Frontend ─────────────────────────────────
# Empty string = same-origin (nginx reverse proxy handles /api/ routing)
colossus_legal_api_url: ""
colossus_legal_cors_origins: "https://colossus-legal-dev.cogmai.com,http://localhost:5473"
colossus_legal_auth_logout_url: "https://auth.cogmai.com/application/o/colossus-services/end-session/?post_logout_redirect_uri=https://colossus-legal-dev.cogmai.com/"
